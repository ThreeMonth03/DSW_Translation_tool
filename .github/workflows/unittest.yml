name: Unit Test

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: make install-dev BOOTSTRAP_PYTHON=python

      - name: Compile Python files
        run: make compile

      - name: Run linter
        run: make lint

      - name: Run infrastructure unit tests
        run: make test-infra

      - name: Run translation unit tests
        run: make test-translation
