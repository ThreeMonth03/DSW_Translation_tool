name: External Translation Check Template

on:
  pull_request:
    branches: [master]

env:
  # Copy this workflow into a dedicated translation-only repository and keep
  # this repository as the canonical tooling source.
  TOOLING_REPOSITORY: ThreeMonth03/DSW_Translation_tool
  TOOLING_REF: master
  # In this tooling repository the checked-in collaboration tree lives under
  # translation/zh_Hant. In a dedicated translation-only repository, change
  # this to "." or another relative root that contains tree/, builds/, and
  # reviews/.
  TRANSLATION_ROOT: translation/zh_Hant

jobs:
  translation-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout translation repository
        uses: actions/checkout@v4
        with:
          path: translation-repo

      - name: Checkout tooling repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TOOLING_REPOSITORY }}
          ref: ${{ env.TOOLING_REF }}
          path: tooling-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tooling dependencies
        working-directory: tooling-repo
        run: make install-dev BOOTSTRAP_PYTHON=python

      - name: Run translation unit tests against external root
        working-directory: tooling-repo
        env:
          DSW_COLLAB_OUTPUT_ROOT: >-
            ${{ github.workspace }}/translation-repo/${{ env.TRANSLATION_ROOT }}
        run: make test-translation
